    <!-- DAYS -->

      const dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

      document.write(days.map((d,i)=>`

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
  "https://ispbevvwwggbktfczmui.supabase.co",
  "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
);

let selectedSkills = [];
let availability = {}; // ✅ FIX เป็น object

// ================= LOAD =================
async function loadProfile() {
  const { data: { user } } = await supabase.auth.getUser();

  const { data } = await supabase
    .from("profiles")
    .select(`*, job_seekers(*)`)
    .eq("id", user.id)
    .single();

  const job = data.job_seekers?.[0];
 
  // 3. ใส่ข้อมูลลงหน้าเว็บ
  const avatarDiv = document.getElementById("avatar");

if (data.avatar_url) {
  avatarDiv.style.backgroundImage = `url('${data.avatar_url}')`;
} else {
  avatarDiv.style.backgroundImage = `url('https://via.placeholder.com/150')`;
}


  // basic
  document.getElementById("fullName").value =
    (data.first_name || "") + " " + (data.last_name || "");
  document.getElementById("phone").value = data.phone_number || "";
  document.getElementById("email").value = data.email;

  const gender = (job?.gender || "").toLowerCase();
document.getElementById("gender").value = gender;
  document.getElementById("birthdate").value = job?.birth_date || "";

  // skills
  selectedSkills = job?.skills || [];
  document.querySelectorAll(".skill").forEach(el => {
    if (selectedSkills.includes(el.dataset.skill)) {
      el.classList.add("bg-primary", "text-white");
    }
  });

  // availability
  availability = job?.availability || {};

  document.querySelectorAll(".availability").forEach(btn => {
    const day = btn.dataset.day;
    const time = btn.dataset.time;

    if (availability[day]?.includes(time)) {
      btn.classList.add("bg-primary");
    }
  });
}

// ================= SKILL =================
document.querySelectorAll(".skill").forEach(el => {
  el.addEventListener("click", () => {
    const skill = el.dataset.skill;

    if (selectedSkills.includes(skill)) {
      selectedSkills = selectedSkills.filter(s => s !== skill);
      el.classList.remove("bg-primary", "text-white");
    } else {
      selectedSkills.push(skill);
      el.classList.add("bg-primary", "text-white");
    }
  });
});

// ================= AVAILABILITY =================
document.addEventListener("click", (e) => {
  if (!e.target.classList.contains("availability")) return;

  const btn = e.target;
  const day = btn.dataset.day;
  const time = btn.dataset.time;

  if (!availability[day]) {
    availability[day] = [];
  }

  if (availability[day].includes(time)) {
    availability[day] = availability[day].filter(t => t !== time);
    btn.classList.remove("bg-primary");
  } else {
    availability[day].push(time);
    btn.classList.add("bg-primary");
  }
});

// ================= SAVE =================
window.saveProfile = async function () {

  const { data: { user } } = await supabase.auth.getUser();

  const fullName = document.getElementById("fullName").value.split(" ");
  const firstName = fullName[0];
  const lastName = fullName.slice(1).join(" ");

  // profiles
  await supabase.from("profiles").update({
    first_name: firstName,
    last_name: lastName,
    phone_number: document.getElementById("phone").value
  }).eq("id", user.id);

  // job_seekers (ใช้ upsert)
  await supabase.from("job_seekers").upsert({
    user_id: user.id,
    gender: document.getElementById("gender").value,
    birth_date: document.getElementById("birthdate").value,
    skills: selectedSkills,
    availability: availability,
    updated_at: new Date()
  }, { onConflict: "user_id" });

  alert("Saved!");
  window.location.href = "Myprofile_seeker.html";
};
const avatarDiv = document.getElementById("avatar");
const photoInput = document.getElementById("photoInput");
const changePhotoBtn = document.getElementById("changePhotoBtn");

// เปิด file selector
changePhotoBtn.addEventListener("click", () => {
  photoInput.click();
});
photoInput.addEventListener("change", async () => {
  const file = photoInput.files[0];
  if (!file) return;

  const { data: { user }, error: userError } = await supabase.auth.getUser();
  if (userError || !user) {
    console.error("No logged-in user:", userError);
    alert("You must be logged in to change photo.");
    return;
  }

  const fileExtension = file.name.split('.').pop();
  const filePath = `${user.id}/avatar.${fileExtension}`; // path ใหม่: userId/avatar.ext

  try {
    // 🔹 ดึงไฟล์เก่า
    const { data: profile, error: profileError } = await supabase
      .from("profiles")
      .select("avatar_url")
      .eq("id", user.id)
      .single();
    if (profileError) throw profileError;

    // ลบไฟล์เก่า (ถ้ามี)
    const oldPath = profile?.avatar_url;
    if (oldPath) {
      const { error: removeError } = await supabase
        .storage.from("profile-avatars")
        .remove([oldPath]);
      if (removeError) console.warn("Old avatar not removed:", removeError.message);
    }

    // 🔹 Upload ใหม่ (ใช้ upsert: true)
    const { error: uploadError } = await supabase
      .storage
      .from("profile-avatars")
      .upload(filePath, file, { upsert: true });

    if (uploadError) throw uploadError;

    // 🔹 Get public URL
    const { data: urlData } = supabase
      .storage
      .from("profile-avatars")
      .getPublicUrl(filePath);

    // 🔹 Update DB (เก็บเป็น path ไม่ใช่ full URL)
    const { error: dbError } = await supabase
      .from("profiles")
      .update({ avatar_url: filePath })
      .eq("id", user.id);
    if (dbError) throw dbError;

    // 🔹 Update preview
    avatarDiv.style.backgroundImage = `url('${urlData.publicUrl}')`;

    alert("Profile photo updated!");
  } catch (err) {
    console.error("Avatar upload failed:", err);
    alert("Failed to update profile photo. Check console for details.");
  }
});

// bind button
document.querySelector("button.bg-primary").onclick = saveProfile;

// init
loadProfile();
</script>
