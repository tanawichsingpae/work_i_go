<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>User Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                        "pending": "#FF6A00",
                        "approved": "#10b981",
                        "rejected": "#ef4444",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>

<body class="bg-background-light dark:bg-background-dark min-h-screen text-slate-900 dark:text-slate-100">
<!-- ================= HEADER ================= -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
  <div class="flex items-center justify-between p-4 max-w-md mx-auto">
    <div class="flex items-center gap-3">
      <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
        <span class="material-symbols-outlined">person</span>
      </div>
      <div>
        <h1 class="text-sm font-bold">Legal Officer</h1>
        <p class="text-[11px] text-slate-500">Job Post Review</p>
      </div>
    </div>
    <button class="size-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800">
      <span class="material-symbols-outlined">logout</span>
    </button>
  </div>
</header>
<main class="max-w-md mx-auto pb-20 px-4 pt-4">
  <!-- WELCOME -->
  <section class="pt-6 pb-2">
    <h2 class="text-2xl font-bold">User Verification</h2>
  </section>

  <!-- FILTER TABS -->
  <div class="flex gap-2 overflow-x-auto hide-scrollbar" id="filter-tabs">
    <button data-status="ALL" class="filter-btn px-5 py-2.5 rounded-full bg-primary text-white text-sm font-semibold">All</button>
    <button data-status="Pending" class="filter-btn px-5 py-2.5 rounded-full bg-white dark:bg-slate-800 text-sm font-semibold border">Pending</button>
    <button data-status="Approved" class="filter-btn px-5 py-2.5 rounded-full bg-white dark:bg-slate-800 text-sm font-semibold border">Approved</button>
    <button data-status="Rejected" class="filter-btn px-5 py-2.5 rounded-full bg-white dark:bg-slate-800 text-sm font-semibold border">Rejected</button>
  </div>

  <!-- USER LIST -->
  <div id="user-list" class="flex flex-col gap-4 mt-4"></div>
</main>

<!-- ===== Bottom Nav ===== -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t">
<div class="max-w-md mx-auto flex">

<button onclick="location.href='Legal_management_post.html'" class="flex-1 py-3 flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined">work</span>
<span class="text-xs">Job Approvals</span>
</button>

<button class="flex-1 py-3 flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">verified_user</span>
<span class="text-xs">User Verification</span>
</button>

<button onclick="location.href='Legal_user_add_report.html'" class="flex-1 py-3 flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined">report</span>
<span class="text-xs">Users & Reports</span>
</button>

</div>
</nav>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ispbevvwwggbktfczmui.supabase.co",
  "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
);

const list = document.getElementById("user-list");
let allUsers = []; // เก็บข้อมูลทั้งหมดเพื่อ filter

// Helper for status badge color
function getStatusBadge(status) {
  switch(status?.toLowerCase()) {
    case "verified": return "bg-green-100 text-green-600";
    case "rejected": return "bg-red-100 text-red-600";
    default: return "bg-orange-100 text-orange-600";
  }
}

// Render user list
function renderUsers(users) {
  list.innerHTML = "";

  if (!users || users.length === 0) {
    list.innerHTML = `<p class="text-sm text-slate-500">No submissions</p>`;
    return;
  }

  users.forEach(u => {
    const businessName = u.employers?.business_name ?? "No Name";
    const storeImage = u.employers?.store_image_url ?? "https://i.pravatar.cc/80";
    const statusColor = getStatusBadge(u.status);

    const div = document.createElement("div");
    div.className = "bg-white dark:bg-slate-700 rounded-xl border p-4 flex gap-3 cursor-pointer hover:shadow";
    div.innerHTML = `
      <img src="${storeImage}" class="w-12 h-12 rounded-full object-cover"/>
      <div class="flex-1">
        <p class="font-bold">${businessName}</p>
        <p class="text-xs text-slate-500">${u.contact_info}</p>
        <span class="inline-block mt-1 px-2 py-0.5 text-xs rounded-full ${statusColor}">
          ${u.status ?? "pending"}
        </span>
        <p class="text-xs text-slate-400 mt-1">Business Reg: ${u.business_registration}</p>
      </div>
    `;

    div.onclick = () => {
      window.location.href = `Legal_verify_users_detail.html?employer_id=${encodeURIComponent(u.employer_id)}`;
    };

    list.appendChild(div);
  });
}

// Load employer verifications
async function loadEmployerVerifications() {
  list.innerHTML = `<p class="text-sm text-slate-500">Loading...</p>`;

  const { data, error } = await supabase
    .from("employer_verifications")
    .select(`*, employers (business_name, store_image_url)`)
    .order("submitted_at", { ascending: false });

  if (error) {
    console.error(error);
    list.innerHTML = `<p class="text-red-500 text-sm">Cannot load data</p>`;
    return;
  }

  allUsers = data || [];
  renderUsers(allUsers);
}

// Filter function
// Filter function
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    // Remove active class from all
    document.querySelectorAll(".filter-btn").forEach(b => {
      b.classList.remove("bg-primary", "text-white");
      b.classList.add("bg-white", "dark:bg-slate-800", "border");
    });

    // Add active class to clicked button
    btn.classList.add("bg-primary", "text-white");
    btn.classList.remove("bg-white", "dark:bg-slate-800", "border");

    const status = btn.dataset.status.toLowerCase();

    let filtered = allUsers;

    if (status === "pending") {
      filtered = allUsers.filter(u => !u.status || u.status.toLowerCase() === "pending");
    } else if (status === "approved" || status === "verified") {
      filtered = allUsers.filter(u => u.status && u.status.toLowerCase() === "verified");
    } else if (status === "rejected") {
      filtered = allUsers.filter(u => u.status && u.status.toLowerCase() === "rejected");
    } 
    // else "all" => filtered = allUsers

    renderUsers(filtered);
  });
});

// Initial load
loadEmployerVerifications();
</script>

</body>
</html>
