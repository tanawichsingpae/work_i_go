<!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ใช้ supabase client เพียงครั้งเดียว
  if (!window.supabaseClient) {
    window.supabaseClient = supabase.createClient(
      "https://ispbevvwwggbktfczmui.supabase.co",
      "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
    );
  }
  const supabaseClient = window.supabaseClient;
  const mainContainer = document.getElementById("main-shifts");

  async function loadShifts() {
    mainContainer.innerHTML = `<p class="text-center py-10">Loading...</p>`;

    // 1️⃣ ดึง user จริง
    const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
    if (!user || userError) {
      mainContainer.innerHTML = `<p class="text-center py-10">Please login</p>`;
      return;
    }

    // 2️⃣ หา job_seeker_id ของ user
    const { data: jobSeeker, error: jsError } = await supabaseClient
      .from("job_seekers")
      .select("job_seeker_id")
      .eq("user_id", user.id)
      .single();

    if (jsError || !jobSeeker) {
      mainContainer.innerHTML = `<p class="text-center py-10">Job seeker not found</p>`;
      return;
    }
    const jobSeekerId = jobSeeker.job_seeker_id;

    // 3️⃣ ดึง employments ผ่าน job_applications
    const { data: applications, error } = await supabaseClient
      .from("job_applications")
      .select(`
        job_application_id,
        jobpost_id,
        employments (
          employment_id,
          start_date,
          end_date,
          agreed_wage,
          employment_status,
          jobposts (
            job_title,
            workplace_name
          ),
          shifts (
            shift_id,
            shift_date,
            start_time,
            end_time,
            status
          )
        )
      `)
      .eq("worker_id", jobSeekerId);

    if (error) {
      console.error(error);
      mainContainer.innerHTML = `<p class="text-center py-10">Error loading data</p>`;
      return;
    }

    // 4️⃣ Flatten employments
    const employments = applications.map(app => app.employments).flat();

    mainContainer.innerHTML = "";
    if (!employments.length) {
      mainContainer.innerHTML = `<p class="text-center py-10">No employments found</p>`;
      return;
    }

    // 5️⃣ สำหรับแต่ละ employment ให้ดึง shifts ที่ status = null และเรียงตาม shift_date, start_time
    employments.forEach(emp => {
  // หา shift ที่กำลังจะถึง
  const upcomingShift = (emp.shifts || [])
    .filter(s => !s.status) // status เป็น null
    .sort((a, b) => {
      const dateA = new Date(`${a.shift_date}T${a.start_time}`);
      const dateB = new Date(`${b.shift_date}T${b.start_time}`);
      return dateA - dateB;
    })[0]; // เอาแค่ shift แรก (closest upcoming)

  // สร้าง card ของ employment พร้อม shift
  mainContainer.appendChild(createEmploymentCard(emp, upcomingShift));
});
  }

  // สร้าง card แบบ shift
  function createEmploymentCard(emp, shift) {
  const job = emp.jobposts;

  const statusColor = {
    'In Progress': 'text-accent',
    'Completed': 'text-success',
    'Pending': 'text-gray-400'
  }[emp.employment_status] || 'text-gray-400';

  const card = document.createElement("div");
  card.className = "px-4 pb-4 cursor-pointer";

  card.addEventListener("click", () => {
    let url = `job_seeker_my_shift_detail.html?employment_id=${emp.employment_id}`;
if (shift) url += `&shift_id=${shift.shift_id}`;
window.location.href = url;
  });

  card.innerHTML = `
    <div class="flex flex-col rounded-xl shadow-md bg-white dark:bg-gray-800 p-4">
      <div class="flex items-center justify-between">
        <p class="${statusColor} text-sm font-bold leading-normal tracking-wide">
          ${emp.employment_status || "Pending"}
        </p>
        <div class="flex items-center gap-1">
          <span class="material-symbols-outlined text-base text-gray-400">payments</span>
          <p class="text-gray-600 dark:text-gray-300 text-sm font-medium leading-normal">
            <span class="font-bold text-[#121416] dark:text-white">
            ${emp.agreed_wage || "0.00"} บาท </span>
          </p>
        </div>
      </div>

      <p class="text-[#121416] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">
        ${job?.job_title || "-"}
      </p>

      <div class="flex flex-col gap-1 mt-1">
        <p class="text-gray-600 dark:text-gray-300 text-base font-normal leading-normal">
          ${job?.workplace_name || "-"}
        </p>
        ${
          shift
            ? `<p class="text-gray-600 dark:text-gray-300 text-base font-normal leading-normal">
                ${shift.shift_date ? new Date(shift.shift_date).toLocaleDateString() : ""} | 
                ${shift.start_time || ""} - ${shift.end_time || ""}
               </p>`
            : `<p class="text-gray-600 dark:text-gray-300 text-base font-normal leading-normal">
                No upcoming shifts
               </p>`
        }
      </div>
    </div>
  `;
  return card;
}
  loadShifts();
</script>
