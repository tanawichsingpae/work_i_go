<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Seeker Check-in QR</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#1358ec",
            "background-light": "#FFFFFF",
            "background-dark": "#23170f",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "sans-serif"]
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body { min-height: 100dvh; }
  </style>
</head>

<body class="bg-background-light font-display">
  <div class="relative mx-auto min-h-screen w-full max-w-md bg-background-light">
    <!-- Top App Bar -->
    <div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
      <div onclick="window.location.href='job_seeker_my_shifts.html'" class="text-[#111318] dark:text-white flex items-center justify-start cursor-pointer">
        <span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
      </div>
      <h2 class="text-[#111318] dark:text-white text-lg font-bold flex-1 text-center">Check-in</h2>
      <div class="w-12"></div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow px-4 py-8 flex flex-col items-center justify-center">
      <!-- QR Code Card -->
      <div id="qr-card" class="flex w-full max-w-sm flex-col items-stretch justify-start rounded-xl shadow-md bg-white dark:bg-[#1C2431] p-4">
        <div class="flex flex-col items-center justify-center p-8">
          <canvas id="qr-canvas" class="w-full aspect-square"></canvas>
        </div>
        <div class="flex w-full flex-col items-stretch justify-center gap-2 pb-8 px-6 text-center">
          <p class="text-[#111318] dark:text-white text-lg font-bold">Show this to the employer to check in</p>
          <p class="text-gray-500 dark:text-gray-400 text-sm font-normal">Ready to scan</p>
        </div>
      </div>

      <!-- User Info -->
      <div class="flex items-center gap-4 bg-transparent px-4 mt-8 w-full max-w-sm justify-between">
        <div class="flex items-center gap-4">
          <div id="user-avatar" class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-12 w-12"></div>
          <p id="user-name" class="text-[#111318] dark:text-white text-base font-semibold truncate"></p>
        </div>
        <div class="shrink-0">
          <button id="refresh-btn" class="flex items-center justify-center gap-2 text-primary text-base font-medium leading-normal rounded-full bg-primary/10 px-4 py-2">
            <span class="material-symbols-outlined text-xl">refresh</span>
            <span>Refresh</span>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    if (!window.supabaseClient) {
      window.supabaseClient = supabase.createClient(
        "https://ispbevvwwggbktfczmui.supabase.co",
        "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
      );
    }
    const supabaseClient = window.supabaseClient;
    const qrCanvas = document.getElementById("qr-canvas");
    const qrCard = document.getElementById("qr-card");
    const userAvatar = document.getElementById("user-avatar");
    const userName = document.getElementById("user-name");
    const refreshBtn = document.getElementById("refresh-btn");

    async function loadQRCode() {
      // ล้าง QR เก่า
      const ctx = qrCanvas.getContext('2d');
      ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);

      // ดึง user ปัจจุบัน
      const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
      if (!user || userError) {
        qrCard.innerHTML = "<p class='text-red-500 text-center py-8'>Please login</p>";
        return;
      }

      // STEP 1: ดึง job_seeker info
      const { data: seekerData, error: seekerError } = await supabaseClient
        .from("job_seekers")
        .select("job_seeker_id, avatar_url, profiles:user_id(first_name,last_name)")
        .eq("user_id", user.id)
        .maybeSingle();

      if (seekerError) console.error("Cannot load job seeker:", seekerError);

      const jobSeekerId = seekerData?.job_seeker_id;
      const fullName = `${seekerData?.profiles?.first_name || ""} ${seekerData?.profiles?.last_name || ""}`.trim();
      userName.textContent = fullName || "Worker";
      userAvatar.style.backgroundImage = `url(${seekerData?.avatar_url || "https://via.placeholder.com/150"})`;

      if (!jobSeekerId) {
        qrCard.innerHTML = "<p class='text-red-500 text-center py-8'>No job seeker record found</p>";
        return;
      }

      // STEP 2: ดึง shift ล่าสุดที่ยังไม่ check-in
      const { data: shifts, error: shiftError } = await supabaseClient
        .from("shifts")
        .select(`
          shift_id,
          shift_date,
          start_time,
          end_time,
          employments!inner(
            employment_id,
            job_application_id,
            job_application:job_application_id!inner(
              worker_id
            )
          )
        `)
        .is("status", null)
        .order("shift_date", { ascending: false })
        .limit(1)
        .eq("employments.job_application.worker_id", jobSeekerId);

      if (shiftError || !shifts?.length) {
        qrCard.innerHTML = "<p class='text-red-500 text-center py-8'>No shift available</p>";
        console.error("Shift load error:", shiftError);
        return;
      }

      const shift = shifts[0];

      // STEP 3: สร้าง QR code เป็น URL สำหรับ check-in
      const qrData = `https://workigo-pan.vercel.app/ConfirmCheck-in_employer.html?shift_id=${shift.shift_id}`;

      QRCode.toCanvas(qrCanvas, qrData, { width: qrCanvas.clientWidth }, function(err) {
        if (err) console.error(err);
      });
    }

    refreshBtn.addEventListener("click", loadQRCode);
    window.addEventListener("load", loadQRCode);
  </script>
</body>
</html>
