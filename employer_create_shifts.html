<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Employer - Create Shifts</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#345395",
              "accent": "#f95e07",
              "success": "#208672",
              "background-light": "#FFFFFF",
              "background-dark": "#23170f",
              "foreground-light": "#141216",
              "foreground-dark": "#f7f6f8"
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "0.75rem",
              "xl": "1rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light font-display flex justify-center">

<div class="w-full max-w-md min-h-screen bg-white overflow-x-hidden pb-24">
<!-- Top App Bar -->
<div class="sticky top-0 z-10 flex h-16 shrink-0 items-center justify-between border-b border-gray-200/80 bg-background-light/80 px-4 backdrop-blur-sm dark:border-gray-800/80 dark:bg-background-dark/80">
<button onclick="history.back()">
    <span class="material-symbols-outlined">arrow_back_ios_new</span>
  </button>
<h1 class="text-lg font-bold text-foreground-light dark:text-foreground-dark">Create Shifts</h1>
<div class="size-10"></div>
</div>
<main class="flex-1 pb-36 space-y-6">

  <!-- HEADER -->
  <div class="p-4">
    <div class="flex items-center gap-4 bg-white p-4 rounded-xl shadow-sm">
      <img id="worker-avatar"
  class="h-12 w-12 rounded-full object-cover"
  src="https://via.placeholder.com/150"/>

<div>
  <p id="worker-name" class="font-bold text-lg">Loading...</p>
  <p class="text-sm text-gray-500">Worker</p>
</div>
    </div>
  </div>

  <!-- FORM CARD -->
  <div class="px-4">
    <div class="bg-white p-4 rounded-xl shadow space-y-4">

      <h2 class="font-bold text-base">Create Schedule</h2>

      <div class="col-span-2">
  <label class="text-xs text-gray-500">ค่าจ้าง (บาท)</label>
  <input id="agreed-wage" 
         class="w-full border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-primary outline-none" 
         type="number" step="0.01" 
         placeholder="เช่น 300">
</div>
      <!-- DATE -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500">Start date</label>
          <input id="start-date" type="date"
            class="w-full border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-primary outline-none">
        </div>

        <div>
          <label class="text-xs text-gray-500">End date</label>
          <input id="end-date" type="date"
            class="w-full border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-primary outline-none">
        </div>
      </div>

      <!-- WEEKDAY -->
      <div>
        <label class="text-xs text-gray-500">Repeat on</label>
        <select id="weekday"
          class="w-full border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-primary outline-none">
          <option>Monday</option>
          <option>Tuesday</option>
          <option>Wednesday</option>
          <option>Thursday</option>
          <option>Friday</option>
          <option>Saturday</option>
          <option>Sunday</option>
        </select>
      </div>

      <!-- TIME -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500">Start time</label>
          <input id="start-time" type="time"
            class="w-full border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-primary outline-none">
        </div>

        <div>
          <label class="text-xs text-gray-500">End time</label>
          <input id="end-time" type="time"
            class="w-full border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-primary outline-none">
        </div>
      </div>

      <!-- ADD BUTTON -->
      <button onclick="addShifts()"
        class="w-full bg-accent hover:bg-orange-600 text-white py-3 rounded-xl font-bold transition">
        + Add Schedule
      </button>

    </div>
  </div>

  <!-- LIST -->
  <div class="px-4">
    <div class="flex items-center justify-between mb-2">
      <h3 class="font-bold text-lg">Scheduled Shifts</h3>
      <span class="text-sm text-gray-400">Preview</span>
    </div>

    <div id="shift-list" class="space-y-3">

      <!-- EMPTY -->
      <div class="text-center text-gray-400 py-6 border rounded-xl">
        No shifts yet
      </div>

    </div>
  </div>

</main>
<!-- Bottom Action Bar and Navigation -->
<div class="fixed inset-x-0 bottom-0 z-10 bg-background-light/80 pb-safe backdrop-blur-sm dark:bg-background-dark/80">
<div class="p-4">
<button onclick="saveAll()" class="w-full rounded-xl bg-primary px-5 py-4 text-center text-base font-bold text-white shadow-lg shadow-primary/20 hover:bg-primary/90">
  Save Schedule
</button></div>
</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ispbevvwwggbktfczmui.supabase.co",
  "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
);

/* ================= PARAM ================= */
const params = new URLSearchParams(window.location.search);
const jobApplicationId = params.get("id");
const jobpostId = params.get("jobpost_id");

/* ================= STATE ================= */
let selectedDate = null;

/* ================= CLICK DAY ================= */
document.querySelectorAll(".grid button").forEach(btn => {
  btn.addEventListener("click", () => {
    const day = btn.innerText.trim();

    // กัน header S M T
    if (isNaN(day)) return;

    selectedDate = `2026-03-${day.padStart(2, "0")}`;

    // reset
    document.querySelectorAll(".grid button").forEach(b => {
      b.classList.remove("bg-accent", "text-white");
    });

    btn.classList.add("bg-accent", "text-white");

    console.log("Selected:", selectedDate);
  });
});

/* ================= SAVE ================= */
document.querySelector("button.w-full").addEventListener("click", saveShift);

async function saveShift() {
  if (!selectedDate) {
    alert("Select date first");
    return;
  }

  const start = `${selectedDate} 09:00:00`;
  const end = `${selectedDate} 17:00:00`;

  const { data: existing } = await supabase
    .from("employments")
    .select("*")
    .eq("job_application_id", jobApplicationId)
    .eq("start_date", start)
    .maybeSingle();

  let result;

  if (existing) {
    result = await supabase
      .from("employments")
      .update({
        end_date: end,
        employment_status: "Active"
      })
      .eq("employment_id", existing.employment_id);
  } else {
    result = await supabase
      .from("employments")
      .insert([{
        job_application_id: jobApplicationId,
        jobpost_id: jobpostId,
        start_date: start,
        end_date: end,
        employment_status: "Active"
      }]);
  }

  if (result.error) {
    console.error(result.error);
    alert("Error saving");
    return;
  }

  loadShifts();
}

/* ================= LOAD ================= */
async function loadShifts() {
  const { data } = await supabase
    .from("shifts")
    .select("*")
    .eq("employment_id", jobApplicationId)
    .order("shift_date");

  const container = document.getElementById("shift-list");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = `<p class="text-gray-400 text-center">No shifts</p>`;
    return;
  }

  data.forEach(s => {
    const date = new Date(s.shift_date);

    const formattedDate = formatDateTH(date);

    const div = document.createElement("div");
    div.className = "flex justify-between bg-white p-4 rounded-xl shadow";

    div.innerHTML = `
      <p>
        ${formattedDate} : ${s.start_time} - ${s.end_time}
      </p>
      <button onclick="deleteShift(${s.shift_id})" class="text-red-500">
        ลบ
      </button>
    `;

    container.appendChild(div);
  });
}
function formatDateTH(date) {
  const d = String(date.getDate()).padStart(2, "0");
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const y = String(date.getFullYear() + 543).slice(-2);

  return `${d}/${m}/${y}`;
}
/* ================= DELETE ================= */
window.deleteShift = async function (id) {
  await supabase
    .from("shifts")
    .delete()
    .eq("shift_id", id);

  loadShifts();
};
function generateShifts(startDate, endDate, weekday, startTime, endTime) {
  const result = [];

  const dayMap = {
    "Sunday": 0,
    "Monday": 1,
    "Tuesday": 2,
    "Wednesday": 3,
    "Thursday": 4,
    "Friday": 5,
    "Saturday": 6
  };

  let current = new Date(startDate);
  const end = new Date(endDate);

  while (current <= end) {
    if (current.getDay() === dayMap[weekday]) {
      const dateStr = current.toISOString().split("T")[0];

      result.push({
        date: dateStr,
        start: `${dateStr} ${startTime}`,
        end: `${dateStr} ${endTime}`
      });
    }

    current.setDate(current.getDate() + 1);
  }

  return result;
}
let allShifts = [];

window.addShifts = function () {
  const startDate = document.getElementById("start-date").value;
  const endDate = document.getElementById("end-date").value;
  const weekday = document.getElementById("weekday").value;
  const startTime = document.getElementById("start-time").value;
  const endTime = document.getElementById("end-time").value;
  const wage = parseFloat(document.getElementById("agreed-wage").value);

  if (!startDate || !endDate || !startTime || !endTime || isNaN(wage)) {
    alert("กรอกข้อมูลให้ครบและค่าจ้างต้องเป็นตัวเลข");
    return;
  }

  const newShifts = generateShifts(startDate, endDate, weekday, startTime, endTime)
    .map(s => ({ ...s, wage }));

  allShifts = [...allShifts, ...newShifts];
  renderShifts();
};
function renderShifts() {
  const container = document.getElementById("shift-list");
  container.innerHTML = "";

  allShifts.forEach((s, index) => {
    const date = new Date(s.date);

    const formattedDate = formatDateTH(date);

    const startTime =
      s.start_date?.split(" ")[1] || s.start?.split(" ")[1];

    const endTime =
      s.end_date?.split(" ")[1] || s.end?.split(" ")[1];

    const div = document.createElement("div");
    div.className = "flex justify-between bg-white p-4 rounded-xl shadow";

    div.innerHTML = `
      <p>
        ${formattedDate} : ${startTime} - ${endTime}
      </p>
      <button onclick="removeShift(${index})" class="text-red-500">
        ลบ
      </button>
    `;

    container.appendChild(div);
  });
}
window.removeShift = function (index) {
  allShifts.splice(index, 1);
  renderShifts();
};
window.saveAll = async function () {
  if (!allShifts.length) {
    alert("กรุณาเพิ่ม schedule ก่อน");
    return;
  }

  // STEP 1: หาว่า employment มีอยู่แล้วหรือยัง
  const { data: existingEmployment } = await supabase
    .from("employments")
    .select("*")
    .eq("employment_id", jobApplicationId) // หรือใช้ job_application_id
    .maybeSingle();

  const start_date = allShifts[0].date; // สมมติวันแรก
  const end_date = allShifts[allShifts.length - 1].date; // วันสุดท้าย
  const wage = parseFloat(document.getElementById("agreed-wage").value);

  let employmentId;

  if (existingEmployment) {
    // อัพเดต employment พร้อมค่าจ้าง
    const { error, data } = await supabase
      .from("employments")
      .update({
        start_date: start_date + " 00:00:00",
        end_date: end_date + " 23:59:59",
        agreed_wage: wage,
        employment_status: "Active"
      })
      .eq("employment_id", existingEmployment.employment_id)
      .select()
      .maybeSingle();

    if (error) {
      console.error(error);
      alert("เกิดข้อผิดพลาดในการบันทึก employment");
      return;
    }

    employmentId = existingEmployment.employment_id;
  } else {
    // สร้าง employment ใหม่
    const { error, data } = await supabase
      .from("employments")
      .insert([{
        job_application_id: jobApplicationId,
        jobpost_id: jobpostId,
        start_date: start_date + " 00:00:00",
        end_date: end_date + " 23:59:59",
        agreed_wage: wage,
        employment_status: "Active"
      }])
      .select()
      .maybeSingle();

    if (error) {
      console.error(error);
      alert("เกิดข้อผิดพลาดในการบันทึก employment");
      return;
    }

    employmentId = data.employment_id;
  }

  // STEP 2: บันทึก shifts
  const rows = allShifts.map(s => ({
    employment_id: employmentId,
    shift_date: s.date,
    start_time: s.start.split(" ")[1],
    end_time: s.end.split(" ")[1]
  }));

  const { error: shiftError } = await supabase
    .from("shifts")
    .insert(rows);

  if (shiftError) {
    console.error(shiftError);
    alert("เกิดข้อผิดพลาดในการบันทึก shifts");
    return;
  }

  alert("Saved all shifts & employment!");
  loadShifts();
};
async function loadWorkerProfile() {
  // STEP 1: เอา employment ก่อน
  const { data: emp, error: empError } = await supabase
    .from("employments")
    .select("job_application_id")
    .eq("employment_id", jobApplicationId) // จริง ๆ คือ employmentId
    .single();

  if (empError) {
    console.error("หา employment ไม่เจอ:", empError);
    return;
  }

  const realJobAppId = emp.job_application_id;

  // STEP 2: เอา worker
  const { data, error } = await supabase
    .from("job_applications")
    .select(`
      job_seekers:worker_id (
        avatar_url,
        profiles:user_id (
          first_name,
          last_name
        )
      )
    `)
    .eq("job_application_id", realJobAppId)
    .single();

  if (error) {
    console.error("โหลดโปรไฟล์ไม่สำเร็จ:", error);
    return;
  }

  const worker = data.job_seekers;
  const profile = worker?.profiles;

  const fullName = [profile?.first_name, profile?.last_name]
    .filter(Boolean)
    .join(" ") || "Unknown";

  const avatar =
    worker?.avatar_url || "https://via.placeholder.com/150";

  document.getElementById("worker-name").textContent = fullName;
  document.getElementById("worker-avatar").src = avatar;
}

loadShifts();
loadWorkerProfile();

</script>
</body></html>
