<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
  "https://ispbevvwwggbktfczmui.supabase.co",
  "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7" // ใช้ key เดิมของคุณ
);

// โหลดข้อมูล
async function loadProfile() {

  // 1. เอา user ที่ login อยู่
  const { data: { user }, error: userError } = await supabase.auth.getUser();

  if (userError || !user) {
    console.log("ยังไม่ได้ login");
    return;
  }

  // 2. ดึงข้อมูล profiles + job_seekers
  const { data, error } = await supabase
    .from("profiles")
    .select(`
      id,
      email,
      first_name,
      last_name,
      phone_number,
      avatar_url,
      birth_date,
      job_seekers (
        gender,
        birth_date,
        skills,
        resume_url,
        availability
        
      )
    `)
    .eq("id", user.id)
    .single();

  if (error) {
    console.error(error);
    return;
  }

  // 3. ใส่ข้อมูลลงหน้าเว็บ
  const avatarDiv = document.getElementById("avatar");

if (data.avatar_url) {
  avatarDiv.style.backgroundImage = `url('${data.avatar_url}')`;
} else {
  avatarDiv.style.backgroundImage = `url('https://via.placeholder.com/150')`;
}

  document.getElementById("fullName").innerText =
    (data.first_name || "") + " " + (data.last_name || "");

  document.getElementById("email").innerText =
    data.email || user.email;

  document.getElementById("phone").innerText =
    data.phone_number || "-";

  document.getElementById("gender").innerText =
  data.job_seekers?.[0]?.gender || "-";

  document.getElementById("birthdate").innerText =
    data.birth_date || data.job_seekers?.birth_date || "-";
    
    const jobSeeker = data.job_seekers?.[0];

const skillsContainer = document.getElementById("skills");
renderAvailability(jobSeeker?.availability || {});

if (jobSeeker?.skills && jobSeeker.skills.length > 0) {
  skillsContainer.innerHTML = jobSeeker.skills
    .map(skill => `
      <span class="px-3 py-1 text-sm font-medium rounded-full border border-primary text-primary bg-primary/10">
        ${skill}
      </span>
    `)
    .join("");
} else {
  skillsContainer.innerHTML = `<span class="text-gray-400">-</span>`;
}
const resumeSection = document.getElementById("resumeSection");

if (jobSeeker?.resume_url) {
  const fileName = jobSeeker.resume_url.split("/").pop();

  resumeSection.innerHTML = `
    <div class="flex items-center justify-between gap-3 p-3 border border-primary/20 rounded-lg bg-primary/5">

      <a href="${jobSeeker.resume_url}" target="_blank"
        class="flex items-center gap-2 text-primary truncate">
        <span class="material-symbols-outlined">description</span>
        <span class="text-sm font-medium truncate">${fileName}</span>
      </a>

      <button onclick="deleteResume()"
        class="px-3 py-1 text-sm bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
        Delete
      </button>

    </div>
  `;
} else {
  resumeSection.innerHTML = `
    <span class="text-gray-400">No resume uploaded</span>
  `;
}
}
window.uploadResume = async function () {
  const fileInput = document.getElementById("resumeInput");
  const file = fileInput.files[0];

  if (!file) {
    alert("กรุณาเลือกไฟล์");
    return;
  }

  if (file.type !== "application/pdf") {
    alert("อัปโหลดได้เฉพาะ PDF");
    return;
  }

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    alert("ยังไม่ได้ login");
    return;
  }

  const filePath = `user-${user.id}/resume.pdf`;

  const { error: uploadError } = await supabase.storage
    .from("resumes")
    .upload(filePath, file, { upsert: true });

  if (uploadError) {
    console.error(uploadError);
    alert("upload ไม่สำเร็จ");
    return;
  }

  const { data: urlData } = supabase.storage
    .from("resumes")
    .getPublicUrl(filePath);

  const fileUrl = urlData.publicUrl;

  await supabase
    .from("job_seekers")
    .update({ resume_url: fileUrl })
    .eq("user_id", user.id);

  alert("อัปโหลดสำเร็จ!");
  await loadProfile();
  fileInput.value = "";
};
window.deleteResume = async function () {

  const confirmDelete = confirm("ต้องการลบ resume ใช่ไหม?");
  if (!confirmDelete) return;

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    alert("ยังไม่ได้ login");
    return;
  }

  // 🔹 ดึง resume_url มาก่อน
  const { data, error } = await supabase
    .from("job_seekers")
    .select("resume_url")
    .eq("user_id", user.id)
    .single();

  if (error || !data?.resume_url) {
    alert("ไม่พบไฟล์");
    return;
  }

  // 🔹 แปลง URL → path
  const filePath = data.resume_url.split("/resumes/")[1];

  // 🔥 ลบจาก storage
  const { error: deleteError } = await supabase.storage
    .from("resumes")
    .remove([filePath]);

  if (deleteError) {
    console.error(deleteError);
    alert("ลบไฟล์ไม่สำเร็จ");
    return;
  }

  // 🔥 ลบใน DB
  const { error: dbError } = await supabase
    .from("job_seekers")
    .update({ resume_url: null })
    .eq("user_id", user.id);

  if (dbError) {
    console.error(dbError);
    alert("ลบข้อมูลไม่สำเร็จ");
    return;
  }

  alert("ลบสำเร็จ!");

  // refresh UI
  await loadProfile();
};
function renderAvailability(availData = {}) {
  const grid = document.getElementById("availabilityGrid");

  const days = ["mon","tue","wed","thu","fri","sat","sun"];
  const dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const times = ["morning","afternoon","evening"];

  let html = `
    <div></div>
    <div>Morning</div>
    <div>Afternoon</div>
    <div>Evening</div>
  `;

  days.forEach((day, i) => {
    html += `<div class="font-semibold">${dayNames[i]}</div>`;

    times.forEach(time => {
      // 🔹 ตรวจสอบว่าช่วงเวลานี้อยู่ใน array ของวันนั้น
      const active = Array.isArray(availData[day]) && availData[day].includes(time);

      html += `
        <div class="h-8 rounded-lg border 
          ${active ? "bg-primary" : "bg-transparent"}">
        </div>
      `;
    });
  });

  grid.innerHTML = html;
}
const logoutBtn = document.getElementById("logoutBtn");

  logoutBtn.addEventListener("click", async () => {
    try {
      // ลบ session ของผู้ใช้
      const { error } = await supabase.auth.signOut();
      if (error) throw error;

      // เปลี่ยนหน้าไป signin.html
      window.location.href = "signin.html";
    } catch (err) {
      console.error("Logout failed:", err);
      alert("Logout ไม่สำเร็จ ลองใหม่");
    }
  });
// เรียกใช้งาน
await loadProfile();

</script>
