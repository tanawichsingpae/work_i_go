<!-- ================= SUPABASE ================= -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ispbevvwwggbktfczmui.supabase.co",
  "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
);

/* ================= ROUTE FUNCTION ================= */
window.goToJob = function (jobpostId, status) {
  if (status === "Approved") {
    location.href = `AcceptDecline.html?jobpost_id=${jobpostId}`;
  } else {
    location.href = `employer_post_status.html?id=${jobpostId}`;
  }
};


    /* ===============================
       LOAD PROFILE
    =============================== */
    async function loadProfile() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    window.location.href = "signin.html";
    return;
  }

  const { data: employer } = await supabase
    .from("employers")
    .select("business_name, store_image_url, verified")
    .eq("user_id", user.id)
    .single();

  const greetingEl = document.getElementById("greeting");

  // ตรวจสอบ verified
  const isVerified = employer?.verified;
// สร้าง span สำหรับติ้ก verified แบบ Material Symbols
const verifySpan = document.createElement("span");
verifySpan.className = `ml-1 material-symbols-outlined filled text-2xl ${isVerified ? 'text-blue-500' : 'text-gray-300'} cursor-pointer`;
verifySpan.textContent = "verified"; // ชื่อไอคอนตรงนี้

  // ถ้าไม่ verified ให้เพิ่ม event listener
  if (!isVerified) {
    verifySpan.title = "Click to verify";
    verifySpan.addEventListener("click", () => {
      location.href = "employer_verify.html"; // เปลี่ยนเป็นหน้า Verify ของคุณ
    });
  }

  // แสดงชื่อพร้อมติ้ก
  greetingEl.innerHTML = employer?.business_name || "User";
  greetingEl.appendChild(verifySpan);

  // แสดงรูปภาพร้าน
  const storeImage = document.getElementById("store_image");
  if (employer?.store_image_url) {
    storeImage.style.backgroundImage = `url('${employer.store_image_url}')`;
  } else {
    storeImage.innerHTML = `<span class="material-symbols-outlined text-gray-400">business</span>`;
  }
}

    async function checkPromotionBeforePosting() {
  const { data: { user }, error: userErr } = await supabase.auth.getUser();
  if (!user || userErr) {
    location.href = "signin.html";
    return;
  }

  const { data: employer, error: empErr } = await supabase
    .from("employers")
    .select("promotion_id")
    .eq("user_id", user.id)
    .single();

  if (empErr || !employer) {
    alert("Employer data not found");
    return;
  }

  return employer.promotion_id; // คืน promotion_id
}

async function getPromotionDetails(promotion_id) {
  const { data: promo, error: promoErr } = await supabase
    .from("promotion")
    .select("*")
    .eq("id", promotion_id)
    .single();

  if (promoErr || !promo) {
    alert("Promotion data not found");
    return null;
  }

  return promo; // คืน promotion object เช่น {id, promotion, price}
}
async function canCreateNewPost(promotion_id) {
  // 1. ดึงข้อมูล promotion
  const promo = await getPromotionDetails(promotion_id);
  if (!promo) return false;

  const { data: { user } } = await supabase.auth.getUser();
  const employer_id = "EM_" + user.id;

  // 2. ดึงจำนวนโพสต์เดือนนี้
  const startOfMonth = new Date();
  startOfMonth.setDate(1);
  startOfMonth.setHours(0, 0, 0, 0);

  const { data: jobposts } = await supabase
    .from("jobposts")
    .select("jobpost_id")
    .eq("employer_id", employer_id)
    .gte("created_at", startOfMonth.toISOString());

  // 3. กำหนด limit ตาม package
  let limit = 0;
  if (promo.promotion === "basic") limit = 3;
  else if (promo.promotion === "pro") limit = 25;
  else if (promo.promotion === "business") limit = Infinity;

  if (jobposts.length >= limit) {
    alert(`Your current package (${promo.promotion}) allows only ${limit} posts per month.`);
    return false;
  }

  return true;
}

async function loadPromotionCards() {
  const { data: promos, error } = await supabase
    .from("promotion")
    .select("*")
    .in("promotion", ["pro", "business"]) // ดึงเฉพาะ Pro และ Business
    .order("promotion", { ascending: true }); // Pro ขึ้นก่อน Business

  if (error) {
    console.error(error);
    return;
  }

  const container = document.getElementById("promoCardsContainer");
  container.innerHTML = "";

  promos.forEach(promo => {
    // สีพื้นและธีมของแต่ละแพ็กเกจ
    const bgClass = promo.promotion === "business" ? "bg-orange-50 border-orange-100" : "bg-blue-50 border-blue-100";
    const textClass = promo.promotion === "business" ? "text-primary" : "text-blue-600";

    const card = document.createElement("div");
    card.className = `rounded-2xl border ${bgClass} p-4`;

    card.innerHTML = `
      <div class="flex items-center justify-between gap-3">
        <div>
          <p class="text-sm text-gray-500">แพ็กเกจที่ต้องสมัคร</p>
          <h4 class="text-lg font-bold ${textClass}">${promo.promotion.toUpperCase()}</h4>
        </div>
        <div class="rounded-xl bg-white px-3 py-2 text-right shadow-sm">
          <p class="text-xs text-gray-400">ราคา</p>
          <p class="text-lg font-extrabold ${textClass}">${promo.price}</p>
        </div>
      </div>

      <div class="mt-3">
        <p class="font-semibold text-gray-900">สิทธิพิเศษหลัก</p>
        <ul class="mt-2 list-disc space-y-1 pl-5 text-sm text-gray-600" id="benefits-${promo.id}">
          <!-- สิทธิพิเศษจะเติมจาก JS -->
        </ul>
      </div>
    `;

    container.appendChild(card);

    // เติม benefits ของแต่ละแพ็กเกจ
    const benefitsList = document.getElementById(`benefits-${promo.id}`);
    if (promo.promotion === "business") {
      benefitsList.innerHTML = `
        <li>ลงประกาศงานได้ไม่จำกัด</li>
        <li>ดันโพสต์ได้ 10 ครั้ง/เดือน นาน 14 วัน</li>
        <li>โพสต์แสดงเด่นในหน้าแรกและหลายตำแหน่งของแพลตฟอร์ม</li>
        <li>มี Smart Matching และ Business Employer Badge</li>
        <li>ใช้งาน Data Insight และ Insight Dashboard ได้</li>
      `;
    } else if (promo.promotion === "pro") {
      benefitsList.innerHTML = `
        <li>โพสต์งานได้ 25 โพสต์/เดือน</li>
        <li>ดันโพสต์ได้นาน 7 วัน</li>
        <li>ไม่มี Data Insight</li>
      `;
    }
  });
}

// กดปุ่ม Dashboard → เปิด Modal + โหลด Promotion Card
document.getElementById("dashboardBtn").addEventListener("click", async () => {
  await loadPromotionCards();
  const modal = document.getElementById("businessPromoModal");
  modal.classList.remove("hidden");
  modal.classList.add("flex");
});

// ปิด Modal
document.getElementById("closeBusinessPromoModal").addEventListener("click", () => {
  const modal = document.getElementById("businessPromoModal");
  modal.classList.add("hidden");
  modal.classList.remove("flex");
});
/* ================= LOAD DASHBOARD ================= */
async function loadDashboard() {
  const { data: { user }, error } = await supabase.auth.getUser();
  if (!user || error) {
    location.href = "signin.html";
    return;
  }

  const employer_id = "EM_" + user.id;

  /* ===== JOB POSTS ===== */
  const { data: jobposts, error: jobErr } = await supabase
    .from("jobposts")
    .select("jobpost_id, job_title, approval_status")
    .eq("employer_id", employer_id)
    .order("created_at", { ascending: false });

  if (jobErr) {
    console.error(jobErr);
    return;
  }

  /* ===== RENDER JOB POSTS ===== */
  const jobContainer = document.getElementById("my-job-posts");
  jobContainer.innerHTML = "";

  jobposts.forEach(job => {
    let badge = "";

    if (job.approval_status === "Approved") {
      badge = `<span class="px-3 py-1 text-xs rounded-full bg-green-100 text-green-700">Approved</span>`;
    } else if (job.approval_status === "Pending") {
      badge = `<span class="px-3 py-1 text-xs rounded-full bg-yellow-100 text-yellow-700">Pending</span>`;
    } else {
      badge = `<span class="px-3 py-1 text-xs rounded-full bg-red-100 text-red-700">Rejected</span>`;
    }

    jobContainer.innerHTML += `
      <div
        onclick="goToJob('${job.jobpost_id}', '${job.approval_status}')"
        class="flex items-center gap-4 bg-gray-50 p-4 rounded-xl border cursor-pointer">

        <div class="flex-1">
          <p class="font-medium">${job.job_title}</p>
          <p class="text-sm text-gray-500">
            Status: ${job.approval_status}
          </p>
        </div>

        ${badge}
      </div>
    `;
  });
/* ===== RECENT APPLICANTS ===== */
// 1. ดึง jobpost_id ทั้งหมดของ employer
const { data: myJobs, error: jobErr2 } = await supabase
  .from("jobposts")
  .select("jobpost_id")
  .eq("employer_id", employer_id)

if (jobErr2) {
  console.error(jobErr2)
  return
}

const jobIds = myJobs.map(j => j.jobpost_id)

// ถ้า employer ยังไม่มี job post
if (jobIds.length === 0) {
  document.getElementById("recent-applicants").innerHTML =
    `<p class="text-sm text-gray-400">No applicants yet</p>`
  return
}

// 2. ดึง applicants จาก jobpost_id เหล่านั้น
const { data: applicants, error: appErr } = await supabase
  .from("job_applications")
  .select(`
    job_application_id,
    application_status,
    applied_at,
    jobposts (
      job_title
    ),
    job_seekers (
      profiles (
        first_name,
        last_name,
        avatar_url
      )
    )
  `)
  .in("jobpost_id", jobIds)
  .order("applied_at", { ascending: false })
  .limit(5)

if (appErr) {
  console.error(appErr)
  return
}

console.log(applicants[0])

// 3. render
const recentContainer = document.getElementById("recent-applicants")
recentContainer.innerHTML = ""

if (applicants.length === 0) {
  recentContainer.innerHTML =
    `<p class="text-sm text-gray-400">No applicants yet</p>`
}

applicants.forEach(app => {
  const profile = app.job_seekers?.profiles

  const fullName = profile
    ? `${profile.first_name ?? ""} ${profile.last_name ?? ""}`.trim()
    : "Unknown"

  const avatar = profile?.avatar_url

  recentContainer.innerHTML += `
    <div class="flex items-center gap-3 bg-gray-50 border rounded-xl p-4">
      
      <!-- Avatar -->
      <div class="h-12 w-12 rounded-full bg-gray-200 overflow-hidden flex items-center justify-center">
        ${
          avatar
            ? `<img src="${avatar}" class="h-full w-full object-cover" />`
            : `<span class="material-symbols-outlined text-gray-400">person</span>`
        }
      </div>

      <!-- Info -->
      <div class="flex-1">
        <p class="font-medium">${fullName || "Unknown"}</p>
        <p class="text-sm text-gray-500">
          Applied for: ${app.jobposts?.job_title ?? "-"}
        </p>
        <p class="text-xs text-gray-400">
          ${new Date(app.applied_at).toLocaleDateString()}
        </p>
      </div>

    </div>
  `
})

// 4. stats
document.getElementById("total-applicants").innerText = applicants.length
  /* ===== STATS ===== */
  document.getElementById("approved-posts").innerText =
    jobposts.filter(j => j.approval_status === "Approved").length;
}
document.getElementById("createJobBtn").addEventListener("click", async () => {
  const promotion_id = await checkPromotionBeforePosting();
  if (!promotion_id) return;

  const allowed = await canCreateNewPost(promotion_id);
  if (!allowed) return;

  // ถ้าอนุญาต => ไปหน้าโพสต์งาน
  localStorage.removeItem("jobPostDraft");
  location.href = "employer_post_a_job_form.html";
});
document.getElementById("dashboardBtn").addEventListener("click", async () => {
  const promotion_id = await checkPromotionBeforePosting();
  if (!promotion_id) return;

  if (Number(promotion_id) === 3) {

    // ✅ ดึง session
    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      alert("Session expired");
      location.href = "signin.html";
      return;
    }

    const token = session.access_token;

    window.location.href =
      "https://workigoemployer-production.up.railway.app/employer?token=" + token;

  } else {
    const modal = document.getElementById("businessPromoModal");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
  }
});
document.getElementById("upgradeBusinessBtn").addEventListener("click", () => {
  location.href = "employer_business.html";
});
loadProfile();
loadDashboard();
</script>
