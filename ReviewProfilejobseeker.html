<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>User Profile - Work-i-Go</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#345293",
            "accent": "#f95e07",
            "success": "#208672",
            "background-light": "#f6f7f8",
            "background-dark": "#14171e",
            "text-light": "#3C3C43",
            "text-dark": "#E5E5E5",
            "neutral-light-subtle": "#F2F2F7",
            "neutral-dark-subtle": "#2C2C2E"
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 24px;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<div class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="flex size-12 shrink-0 items-center justify-start">
<button onclick="history.back()"class="material-symbols-outlined">arrow_back_ios_new</button>
</div>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center"></h2>
<div class="flex w-12 items-center justify-end">

</div>
</div>
<!-- Profile Header -->
<div class="flex p-4 @container">
<div class="flex w-full flex-col gap-4 items-center">
<div class="flex gap-4 flex-col items-center">
<div id="avatar"
  class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 ring-4 ring-white dark:ring-background-dark shadow-soft">
</div>
<div class="flex flex-col items-center justify-center">
<p id="profileName" class="text-[22px] font-bold text-center">-</p>
<div class="flex items-center gap-2 mt-2">
<p id="profileEmail" class="text-base text-center">-</p>
</div>
<p id="profileAge" class="text-sm text-gray-500 text-center">-</p>
</div>
</div>
<div class="flex items-center gap-3 flex-wrap justify-center">
<div class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary/20 text-primary px-4">
<p class="text-sm font-medium leading-normal">Job Seeker</p>

</div>
</div>
<!-- ===== Resume Section ===== -->
<div class="px-4 pb-4">
  <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">

    <div class="flex items-center justify-between">
  <button id="viewResumeBtn" class="flex items-center gap-3">
    <span class="material-symbols-outlined text-primary">description</span>
    <p id="resumeText" class="font-semibold text-gray-800">Resume</p>
  </button>
</div>


  </div>
</div>
</div>
</div>
<!-- Rating Summary -->
<div class="px-4 pb-4">
<div class="flex flex-wrap gap-x-8 gap-y-6 p-4 rounded-xl bg-neutral-light-subtle dark:bg-neutral-dark-subtle">
<div class="flex flex-col gap-2">
<p id="avgRating" class="text-4xl font-black">0.0</p>


<div id="avgStars" class="flex gap-0.5 text-accent"></div>

<p id="totalReviews" class="text-[#6a7181] dark:text-gray-400 text-base font-normal leading-normal">(0 reviews)</p>
</div>
<div class="grid min-w-[200px] max-w-[400px] flex-1 grid-cols-[20px_1fr_40px] items-center gap-y-3">
<p class="text-text-light dark:text-text-dark text-sm font-normal leading-normal">5</p>
<div class="flex h-2 flex-1 bg-gray-300 rounded-full">
<div id="bar-5" class="bg-primary rounded-full" style="width:0%"></div></div>
<span id="percent-5" class="w-12 text-right text-gray-400">0%</span>

<p class="text-text-light dark:text-text-dark text-sm font-normal leading-normal">4</p>
<div class="flex h-2 flex-1 bg-gray-300 rounded-full">
<div id="bar-4" class="bg-primary rounded-full" style="width:0%"></div></div>
<span id="percent-4" class="w-12 text-right text-gray-400">0%</span>

<p class="text-text-light dark:text-text-dark text-sm font-normal leading-normal">3</p>
<div class="flex h-2 flex-1 bg-gray-300 rounded-full">
<div id="bar-3" class="bg-primary rounded-full" style="width:0%"></div></div>
<span id="percent-3" class="w-12 text-right text-gray-400" >0%</span>

<p class="text-text-light dark:text-text-dark text-sm font-normal leading-normal">2</p>
<div class="flex h-2 flex-1 bg-gray-300 rounded-full">
<div id="bar-2" class="bg-primary rounded-full" style="width:0%"></div></div>
<span id="percent-2" class="w-12 text-right text-gray-400" >0%</span>

<p class="text-text-light dark:text-text-dark text-sm font-normal leading-normal">1</p>
<div class="flex h-2 flex-1 bg-gray-300 rounded-full">
<div id="bar-1" class="bg-primary rounded-full" style="width:0%"></div></div>
<span id="percent-1" class="w-12 text-right text-gray-400" >0%</span></div>
</div>
</div>

<!-- Tab Content: Job History -->
<div id="reviewList" class="p-4 space-y-4"></div> <!-- Spacer to push nav to bottom -->

</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const sb = createClient(
  "https://ispbevvwwggbktfczmui.supabase.co",
  "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
);

const jobSeekerId = new URLSearchParams(window.location.search).get("job_seeker_id");

// คำนวณอายุ
function getAge(birthDateStr) {
  if (!birthDateStr) return "-";
  const today = new Date();
  const birthDate = new Date(birthDateStr);
  let age = today.getFullYear() - birthDate.getFullYear();
  const m = today.getMonth() - birthDate.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
    age--;
  }
  return age;
}

// โหลดโปรไฟล์
async function loadProfile() {
  if (!jobSeekerId) return;

  const { data, error } = await sb
    .from("job_seekers")
    .select(`
      job_seeker_id,
      user_id,
      bio,
      gender,
      birth_date,
      resume_url,
      profiles (
        first_name,
        last_name,
        avatar_url,
        email
      )
    `)
    .eq("job_seeker_id", jobSeekerId)
    .single();

  if (error || !data) {
    console.log(error);
    return;
  }

  const p = data.profiles || {};

  const fullName =
    `${p.first_name ?? ""} ${p.last_name ?? ""}`.trim() || "Unknown";

  const avatar =
    p.avatar_url || "https://via.placeholder.com/150";

  // 👉 set UI
  document.getElementById("profileName").innerText = fullName;
  document.getElementById("profileEmail").innerText = p.email || "-";
  document.getElementById("profileAge").innerText =
    `${data.gender ?? "-"} • อายุ ${getAge(data.birth_date)} ปี`;

  document.getElementById("avatar").style.backgroundImage = `url('${avatar}')`;
  loadReviews(data.user_id);

  const resumeUrl = data.resume_url;

const btn = document.getElementById("viewResumeBtn");
const text = document.getElementById("resumeText");

if (resumeUrl) {
  text.innerText = "View Resume";

  btn.onclick = () => {
    window.open(resumeUrl, "_blank");
  };
} else {
  text.innerText = "No resume uploaded";
  btn.classList.add("opacity-50", "cursor-not-allowed");

  btn.onclick = () => {
    alert("User has not uploaded resume");
  };
}
}

// ================== LOAD REVIEWS ==================
async function loadReviews(profileId) {
  if (!profileId) return;

  const { data: reviews, error } = await sb
    .from("reviews")
    .select(`
      rating,
      comment,
      created_at,
      reviewer:reviewer_id (
        first_name,
        last_name,
        avatar_url
      )
    `)
    .eq("reviewee_id", profileId)
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  renderRatingSummary(reviews || []);
  renderReviews(reviews || []);
}

function renderStars(avg) {
  const container = document.getElementById("avgStars");
  container.innerHTML = "";

  const full = Math.floor(avg);
  const hasHalf = avg % 1 >= 0.5;

  for (let i = 0; i < full; i++) {
    container.innerHTML += `
      <span class="material-symbols-outlined !text-[18px]" 
        style="font-variation-settings:'FILL' 1;">
        star
      </span>`;
  }

  if (hasHalf) {
    container.innerHTML += `
      <span class="material-symbols-outlined !text-[18px]" 
        style="font-variation-settings:'FILL' 1;">
        star_half
      </span>`;
  }

  const remaining = 5 - full - (hasHalf ? 1 : 0);

  for (let i = 0; i < remaining; i++) {
    container.innerHTML += `
      <span class="material-symbols-outlined !text-[18px] text-gray-300">
        star
      </span>`;
  }
}

// ================== RATING SUMMARY ==================
function renderRatingSummary(reviews) {
  const total = reviews.length;

  const avg =
    total > 0
      ? reviews.reduce((sum, r) => sum + (r.rating || 0), 0) / total
      : 0;

  // update average
  document.getElementById("avgRating").innerText = avg.toFixed(1);
  document.getElementById("totalReviews").innerText = `(${total} reviews)`;
  renderStars(avg);

  // count distribution
  const count = [0, 0, 0, 0, 0];
  reviews.forEach(r => {
    if (r.rating) count[r.rating - 1]++;
  });

  // update progress bars
  for (let i = 1; i <= 5; i++) {
    const percent = total ? Math.round((count[i - 1] / total) * 100) : 0;
    document.getElementById(`bar-${i}`).style.width = percent + "%";
    document.getElementById(`percent-${i}`).innerText = percent + "%";
  }
}

// ================== REVIEW LIST ==================
function renderReviews(reviews) {
  const container = document.getElementById("reviewList");

  container.innerHTML = reviews.map(r => {
    const name = r.reviewer
      ? `${r.reviewer.first_name ?? ""} ${r.reviewer.last_name ?? ""}`
      : "Unknown";

    const avatar =
      r.reviewer?.avatar_url || "https://via.placeholder.com/40";

    return `
  <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100">

    <!-- Header -->
    <div class="flex items-start justify-between mb-3">
      
      <!-- Left: Avatar + Name -->
      <div class="flex items-center gap-3">
        <img src="${avatar}" 
             class="w-12 h-12 rounded-full object-cover ring-2 ring-primary/20"/>

        <div>
          <p class="font-semibold text-base text-gray-800">${name}</p>
          <p class="text-xs text-gray-400">
            ${new Date(r.created_at).toLocaleDateString()}
          </p>
        </div>
      </div>

      <!-- Right: Rating -->
      <div class="text-right">
        <p class="text-sm font-bold text-gray-700 mb-1">
          ${r.rating?.toFixed(1) || "0.0"}
        </p>
        <div class="text-accent text-sm">
          ${"★".repeat(r.rating || 0)}${"☆".repeat(5 - (r.rating || 0))}
        </div>
      </div>

    </div>

    <!-- Comment -->
    <p class="text-base text-gray-700 leading-relaxed">
      ${r.comment || "-"}
    </p>

  </div>
`;
  }).join("");
}

// ================== INIT ==================
loadProfile();
</script>
</body></html>
