<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shop Profile</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { font-family: 'Manrope', sans-serif; }
.material-symbols-outlined.filled {
  font-variation-settings: 'FILL' 1;
}
</style>
</head>

<body class="bg-gray-50">

<div class="max-w-md mx-auto bg-white min-h-screen">

<!-- HEADER -->
<div class=" text-white p-4 flex items-center justify-between">
  <span onclick="history.back()" class="material-symbols-outlined text-gray-700 cursor-pointer">arrow_back</span>
  <h1 class="text-black font-bold">Shop Profile</h1>
  <span></span>
</div>

<!-- COVER -->
<div class="h-40 bg-gray-200"></div>

<!-- AVATAR -->
<div class="flex justify-center -mt-16">
  <div id="shop-avatar"
    class="w-32 h-32 rounded-full bg-gray-200 bg-cover border-4 border-white">
  </div>
</div>

<!-- NAME -->
<div class="text-center mt-4">
  <div class="flex justify-center items-center gap-2">
    <h2 id="shop-name" class="text-xl font-bold">Loading...</h2>

    <!-- VERIFIED -->
    <span id="verify-badge"
      class="material-symbols-outlined filled text-blue-500 text-2xl hidden">
      verified
    </span>
  </div>

  <p id="shop-type" class="text-gray-500 text-sm mt-1">-</p>
</div>

<!-- INFO -->
<div class="p-4 space-y-3">

  <div class="border-b pb-2">
    <p class="text-gray-400 text-sm">Phone</p>
    <p id="shop-phone">-</p>
  </div>

  <div class="border-b pb-2">
    <p class="text-gray-400 text-sm">Email</p>
    <p id="shop-email">-</p>
  </div>

  <div class="border-b pb-2">
    <p class="text-gray-400 text-sm">Address</p>
    <p id="shop-address">-</p>
  </div>

</div>

<!-- STATS -->
<div class="grid grid-cols-3 text-center p-4 border-t">
  <div>
    <p id="stat-total" class="font-bold text-lg">0</p>
    <p class="text-xs text-gray-400">Total</p>
  </div>
  <div>
    <p id="stat-active" class="font-bold text-lg">0</p>
    <p class="text-xs text-gray-400">Active</p>
  </div>
  <div>
    <p id="stat-closed" class="font-bold text-lg">0</p>
    <p class="text-xs text-gray-400">Closed</p>
  </div>
</div>

<div class="p-4">
  <button id="logoutBtn"
    class="w-full bg-red-500/10 text-red-600 py-3 rounded-xl font-semibold hover:bg-red-500/20 transition">
    Logout
  </button>
</div>
</div>

<!-- ================= SUPABASE ================= -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ispbevvwwggbktfczmui.supabase.co",
  "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
);

async function loadProfile() {

  // 🔹 USER
  const { data: { user }, error: userErr } = await supabase.auth.getUser();
  if (!user || userErr) {
    location.href = "signin.html";
    return;
  }

  // 🔹 EMPLOYER
  const { data: emp, error } = await supabase
  .from("employers")
  .select(`
    *,
    profiles (
      email
    )
  `)
  .eq("user_id", user.id)
  .single();

  if (error || !emp) {
    console.error(error);
    alert("โหลดข้อมูลไม่สำเร็จ");
    return;
  }

  // ===== UI =====

  document.getElementById("shop-name").textContent = emp.business_name || "-";
  document.getElementById("shop-type").textContent = emp.business_type || "-";
  document.getElementById("shop-address").textContent = emp.address || "-";
// CONTACT (แก้ใหม่)
const phone = emp.contact_method === "phone"
  ? emp.contact_value
  : emp.profiles?.phone_number;

const email = emp.contact_method === "email"
  ? emp.contact_value
  : emp.profiles?.email;

// ใส่ค่า
document.getElementById("shop-phone").textContent = phone || "-";
document.getElementById("shop-email").textContent = email || "-";

  // IMAGE
  if (emp.store_image_url) {
    document.getElementById("shop-avatar").style.backgroundImage =
      `url('${emp.store_image_url}')`;
  }

  // VERIFIED
  const badge = document.getElementById("verify-badge");
  if (emp.verified) {
    badge.classList.remove("hidden");
  } else {
    badge.classList.add("hidden");
  }

  // ===== JOB STATS =====
  const employer_id = "EM_" + user.id;

  const { data: jobs } = await supabase
    .from("jobposts")
    .select("approval_status")
    .eq("employer_id", employer_id);

  if (jobs) {
    document.getElementById("stat-total").textContent = jobs.length;
    document.getElementById("stat-active").textContent =
      jobs.filter(j => j.approval_status === "Approved").length;
    document.getElementById("stat-closed").textContent =
      jobs.filter(j => j.approval_status !== "Approved").length;
  }
}
// LOGOUT
document.getElementById("logoutBtn").addEventListener("click", async () => {
  const confirmLogout = confirm("Are you sure you want to logout?");
  if (!confirmLogout) return;

  const { error } = await supabase.auth.signOut();

  if (error) {
    alert("Logout failed");
    console.error(error);
    return;
  }

  // กลับหน้า login
  window.location.href = "signin.html";
});

loadProfile();
</script>

</body>
</html>
