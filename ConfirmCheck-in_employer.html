<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Employer - Confirm Check-in</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
  body { font-family: "Manrope", sans-serif; background-color: #f8f7f5; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; }
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

<div id="container" class="flex flex-col items-center justify-center p-6 bg-white rounded-3xl shadow-lg w-full max-w-sm">
  <div id="statusIcon" class="flex items-center justify-center w-20 h-20 rounded-full bg-gray-200 mb-4">
    <span class="material-symbols-outlined text-5xl text-gray-400">qr_code_scanner</span>
  </div>
  <h1 id="statusText" class="text-xl font-bold text-center mb-2">Scanning QR...</h1>
  <p id="timestamp" class="text-gray-500 text-center mb-4">Please wait</p>
  <button id="backBtn" class="hidden bg-orange-500 text-white py-3 px-6 rounded-xl font-bold">Back</button>
</div>

<!-- HTML5 QR Scanner -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ispbevvwwggbktfczmui.supabase.co",
  "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
);

const statusIcon = document.getElementById("statusIcon");
const statusText = document.getElementById("statusText");
const timestamp = document.getElementById("timestamp");
const backBtn = document.getElementById("backBtn");

let shiftId = null;

// ฟังก์ชันตรวจสอบ shift_id และบันทึก check-in
async function checkInShift(shiftIdInt) {
  if (!shiftIdInt) {
    statusText.textContent = "Invalid QR";
    statusIcon.innerHTML = '<span class="material-symbols-outlined text-5xl text-red-600">error</span>';
    backBtn.classList.remove("hidden");
    return;
  }

  const { data, error } = await supabase
    .from("shifts")
    .update({
      status: "login",
      checkin_time: new Date()
    })
    .eq("shift_id", shiftIdInt)
    .select()
    .single();

  if (error || !data) {
    console.error(error);
    statusText.textContent = "Check-in failed";
    statusIcon.innerHTML = '<span class="material-symbols-outlined text-5xl text-red-600">error</span>';
    backBtn.classList.remove("hidden");
    return;
  }

  // แสดงผลสำเร็จ
  statusText.textContent = "Check-in Successful";
  timestamp.textContent = `Timestamp: ${new Date(data.checkin_time).toLocaleString()}`;
  statusIcon.innerHTML = '<span class="material-symbols-outlined text-5xl text-green-600">check_circle</span>';
  backBtn.classList.remove("hidden");
}

// ฟังก์ชันเริ่ม scanner
async function startScanner() {
  const html5QrCode = new Html5Qrcode("container");

  const devices = await Html5Qrcode.getCameras();
  const cameraId = devices.length ? devices[0].id : null;

  if (!cameraId) {
    statusText.textContent = "No camera found";
    return;
  }

  html5QrCode.start(
    cameraId,
    { fps: 10, qrbox: 250 },
    async (decodedText) => {
      // QR อาจเป็น URL หรือ JSON {"shift_id": ...}
      let shiftInt = null;

      try {
        // ถ้า JSON
        const obj = JSON.parse(decodedText);
        shiftInt = parseInt(obj.shift_id, 10);
      } catch (e) {
        // ถ้าเป็น URL เช่น ?shift_id=2
        try {
          const url = new URL(decodedText);
          shiftInt = parseInt(url.searchParams.get("shift_id"), 10);
        } catch {}
      }

      shiftId = shiftInt;
      html5QrCode.stop();
      checkInShift(shiftId);
    },
    (errorMessage) => {
      // optional: console.log("Scan error", errorMessage);
    }
  );
}

// ปุ่มกลับ
backBtn.addEventListener("click", () => {
  window.location.href = "/"; // กลับหน้า scanner หรือ home
});

// เริ่ม scanner
startScanner();
</script>

</body>
</html>
