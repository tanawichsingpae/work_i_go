<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Search</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <style>
    body {
      font-family: "Plus Jakarta Sans", sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .material-symbols-outlined.fill-1 {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>

<body class="bg-background-light">
  <div class="relative mx-auto min-h-screen w-full max-w-md bg-background-light">

    <!-- ===== TOP BAR ===== -->
    <div class="sticky top-0 z-10 flex items-center gap-3 bg-white px-4 py-3 shadow-sm">
      <h1 class="text-lg font-bold text-gray-900 tracking-tight">Job Search</h1>
    </div>

    <!-- ===== SEARCH BAR ===== -->
    <div class="px-4 py-4">
      <div class="flex items-center gap-2 rounded-xl bg-white p-2 shadow-sm">
        <span class="material-symbols-outlined text-gray-400 text-2xl">search</span>
        <input id="searchInput" type="text" placeholder="Search by job, skill, or company"
          class="flex-1 text-sm rounded-2xl focus:outline-none" />
      </div>
    </div>

    <!-- ===== FILTER BUTTONS ===== -->
    <div class="px-4 flex gap-3 overflow-x-auto py-2">
      <div class="flex-grow"></div>
      <button id="filterButton" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-gray-100">
        <span class="material-symbols-outlined">tune</span>
      </button>
    </div>
    <!-- ===== FILTER MODAL ===== -->
<!-- ===== FILTER MODAL ===== -->
<div id="filterModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
  <div class="bg-white w-11/12 max-w-md rounded-3xl p-6 overflow-y-auto max-h-[90vh] shadow-xl">
    <!-- Header -->
    <div class="flex justify-between items-center border-b border-gray-200 pb-3 mb-4">
      <h2 class="text-lg font-bold text-gray-900">Filter Jobs</h2>
      <button id="closeFilter" class="text-gray-400 hover:text-gray-600 transition">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Province -->
    <label class="block mb-4">
      <span class="text-sm font-medium text-gray-700">Province</span>
      <select id="provinceSelect" class="mt-2 w-full rounded-xl border border-gray-300 px-3 py-2 shadow-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <option value="">All</option>
      </select>
    </label>

    <!-- Job Type -->
    <label class="block mb-4">
      <span class="text-sm font-medium text-gray-700">Job Type</span>
      <select id="jobTypeSelect" class="mt-2 w-full rounded-xl border border-gray-300 px-3 py-2 shadow-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <option value="">All</option>
      </select>
    </label>

    <!-- Wage -->
    <div class="flex gap-3 mb-4">
      <label class="flex-1">
        <span class="text-sm font-medium text-gray-700">Min Wage</span>
        <input type="number" id="minWage" placeholder="0" class="mt-2 w-full rounded-xl border border-gray-300 px-3 py-2 shadow-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"/>
      </label>
      <label class="flex-1">
        <span class="text-sm font-medium text-gray-700">Max Wage</span>
        <input type="number" id="maxWage" placeholder="0" class="mt-2 w-full rounded-xl border border-gray-300 px-3 py-2 shadow-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"/>
      </label>
    </div>

    <!-- Age -->
    <label class="block mb-4">
      <span class="text-sm font-medium text-gray-700">Your Age</span>
      <input type="number" id="ageInput" placeholder="Your Age" class="mt-2 w-full rounded-xl border border-gray-300 px-3 py-2 shadow-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"/>
    </label>

    <!-- Gender -->
    <label class="block mb-4">
      <span class="text-sm font-medium text-gray-700">Gender</span>
      <select id="genderSelect" class="mt-2 w-full rounded-xl border border-gray-300 px-3 py-2 shadow-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <option value="">All</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </label>

    <!-- Buttons -->
    <div class="flex justify-end gap-3 mt-6">
      <button id="closeFilter" class="px-5 py-2 rounded-xl bg-gray-200 hover:bg-gray-300 transition font-medium">Cancel</button>
      <button id="applyFilter" class="px-5 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium transition">Apply</button>
    </div>
  </div>
</div>

    <!-- ===== JOB LIST ===== -->
    <div id="jobListContainer" class="px-4 flex flex-col gap-4 py-2"></div>

    <!-- ===== BOTTOM NAV ===== -->
    <nav class="fixed bottom-0 left-0 right-0 z-20 flex h-20 justify-around border-t border-gray-200 bg-white">
      <a class="flex flex-col items-center justify-center gap-1 w-full text-gray-400" href="job_seeker_home.html">
        <span class="material-symbols-outlined">home</span>
        <span class="text-xs font-medium">Home</span>
      </a>
      <a class="flex flex-col items-center justify-center gap-1 w-full text-primary" href="job_search.html">
        <span class="material-symbols-outlined fill-1">search</span>
        <span class="text-xs font-bold">Search</span>
      </a>
      <a class="flex flex-col items-center justify-center gap-1 w-full text-gray-400" href="job_seeker_my_shifts.html">
        <span class="material-symbols-outlined">calendar_month</span>
        <span class="text-xs font-medium">Shifts</span>
      </a>
      <a class="flex flex-col items-center justify-center gap-1 w-full text-gray-400" href="Myprofile_seeker.html">
        <span class="material-symbols-outlined">person</span>
        <span class="text-xs font-medium">Profile</span>
      </a>
    </nav>

  </div>

  <!-- ===== SUPABASE ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = window.supabase.createClient(
      "https://ispbevvwwggbktfczmui.supabase.co",
      "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
    );

    const container = document.getElementById('jobListContainer');
    const searchInput = document.getElementById('searchInput');
    const filterModal = document.getElementById('filterModal');
  const filterButton = document.getElementById('filterButton');
  const closeFilter = document.getElementById('closeFilter');
  const applyFilter = document.getElementById('applyFilter');

  const provinceSelect = document.getElementById('provinceSelect');
  const jobTypeSelect = document.getElementById('jobTypeSelect');
  const minWageInput = document.getElementById('minWage');
  const maxWageInput = document.getElementById('maxWage');
const ageInput = document.getElementById('ageInput'); // เพิ่ม input ใน modal
  const genderSelect = document.getElementById('genderSelect');

  // เปิด modal
  filterButton.addEventListener('click', () => {
    filterModal.classList.remove('hidden');
    filterModal.classList.add('flex');
  });

  // ปิด modal
  closeFilter.addEventListener('click', () => {
    filterModal.classList.add('hidden');
    filterModal.classList.remove('flex');
  });

  // Load Provinces
  async function loadProvinces() {
    const { data: provinces } = await supabaseClient
      .from('provinces')
      .select('id,name_th')
      .order('name_th');
    provinces.forEach(p => {
      const option = document.createElement('option');
      option.value = p.id;
      option.textContent = p.name_th;
      provinceSelect.appendChild(option);
    });
  }

  // Load Job Types
  async function loadJobTypes() {
    const { data: types } = await supabaseClient
      .from('job_types')
      .select('job_type_id,job_type')
      .order('job_type');
    types.forEach(t => {
      const option = document.createElement('option');
      option.value = t.job_type_id;
      option.textContent = t.job_type;
      jobTypeSelect.appendChild(option);
    });
  }

  loadProvinces();
  loadJobTypes();

  // Apply Filter
  applyFilter.addEventListener('click', () => {
    const filters = {
      province: provinceSelect.value,
      jobType: jobTypeSelect.value,
      minWage: minWageInput.value,
      maxWage: maxWageInput.value,
      age: ageInput.value,
      gender: genderSelect.value
    };

    filterModal.classList.add('hidden');
    filterModal.classList.remove('flex');

    fetchJobs(searchInput.value.trim(), filters);
  });

  // ปรับ fetchJobs ให้รองรับทุก filter
  async function fetchJobs(query = '', filters = {}) {
  container.innerHTML = `<p class="text-center text-gray-400 py-10">Loading jobs...</p>`;

  let queryBuilder = supabaseClient
    .from('jobposts')
    .select(`
      jobpost_id,
      job_title,
      workplace_name,
      address,
      province_id,
      job_type_id,
      wage_amount,
      age_requirement,
      gender_requirement,
      workers_needed,
      employers!jobposts_employer_id_fkey(store_image_url)
    `)
    .eq('approval_status', 'Approved')
    .order('created_at', { ascending: false });

  // Keyword search
  if (query.trim()) {
    queryBuilder = queryBuilder.or(`job_title.ilike.%${query}%,workplace_name.ilike.%${query}%`);
  }

  // Filter province, job type
  if (filters.province) queryBuilder = queryBuilder.eq('province_id', filters.province);
  if (filters.jobType) queryBuilder = queryBuilder.eq('job_type_id', filters.jobType);
  if (filters.minWage) queryBuilder = queryBuilder.gte('wage_amount', filters.minWage);
  if (filters.maxWage) queryBuilder = queryBuilder.lte('wage_amount', filters.maxWage);

  // Filter gender (รวม Any)
  if (filters.gender) {
    queryBuilder = queryBuilder.or(
      `gender_requirement.eq.${filters.gender},gender_requirement.eq.Any`
    );
  }

  // Filter age
  const age = parseInt(filters.age, 10);
  if (!isNaN(age)) {
    queryBuilder = queryBuilder
      .filter('age_requirement->>from', 'lte', age)
      .filter('age_requirement->>to', 'gte', age);
  }

  const { data: jobs, error } = await queryBuilder;
  if (error) return console.error(error);

  container.innerHTML = '';
  if (!jobs || jobs.length === 0) {
    container.innerHTML = `<p class="text-center text-gray-400 py-10">No jobs found for "${query}"</p>`;
    return;
  }

  jobs.forEach(job => {
    const card = document.createElement('div');
    card.className = "rounded-xl bg-white shadow cursor-pointer p-4 flex gap-3";
    card.onclick = () => window.location.href = `job_details.html?id=${job.jobpost_id}`;

    const imageUrl = job.employers?.store_image_url || "https://placehold.co/64x64?text=Shop";

    card.innerHTML = `
      <img src="${imageUrl}" class="h-16 w-16 rounded-lg object-cover border bg-gray-100" alt="Store" />
      <div class="flex-1">
        <p class="text-sm font-bold">${job.job_title}</p>
        <p class="text-xs text-gray-500">${job.workplace_name}</p>
        <p class="text-xs text-gray-400 mt-1">📍 ${job.address ?? "ไม่ระบุที่อยู่"}</p>
        <p class="mt-1 text-sm font-bold text-emerald-600">${job.wage_amount} / ชม.</p>
        <p class="text-xs text-gray-400">ต้องการ ${job.workers_needed} คน</p>
      </div>
    `;
    container.appendChild(card);
  });
}

  // Debounce search
  let debounceTimer;
  searchInput.addEventListener('input', e => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      fetchJobs(e.target.value.trim());
    }, 500);
  });

  async function loadProvinces() {
    // ดึงข้อมูล province จาก Supabase
    const { data: provinces, error } = await supabaseClient
      .from('provinces')
      .select('id, name_th')
      .order('name_th', { ascending: true });

    if (error) {
      console.error('Error loading provinces:', error);
      return;
    }

    provinces.forEach(province => {
      const option = document.createElement('option');
      option.value = province.id; // ใช้ id ของจังหวัดเป็น value
      option.textContent = province.name_th; // แสดงชื่อจังหวัด
      provinceSelect.appendChild(option);
    });
  }

  // เรียก loadProvinces ตอนโหลดหน้า
  loadProvinces();

  fetchJobs();
  </script>
</body>

</html>
