<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Scanner</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
  body {
    font-family: "Manrope", sans-serif;
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400;
  }

  /* เส้น scan animation */
  .scan-line {
    position: absolute;
    width: 100%;
    height: 2px;
    background: #ff6a00;
    animation: scan 2s linear infinite;
  }

  @keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
  }
</style>
</head>

<body>

<div class="relative w-full h-screen overflow-hidden">

  <!-- 🎥 กล้องจริง -->
  <div id="reader" class="absolute inset-0 z-0"></div>

  <!-- overlay ดำ -->
  <div class="absolute inset-0 bg-black/50 z-10"></div>

  <!-- UI -->
  <div class="relative z-20 h-full flex flex-col">

    <!-- TOP BAR -->
    <div class="flex items-center p-4">
      <button onclick="history.back()" class="text-white">
        <span class="material-symbols-outlined text-2xl">arrow_back</span>
      </button>
      <h2 class="text-white text-lg font-bold flex-1 text-center">
        QR Scanner
      </h2>
    </div>

    <!-- CENTER SCAN AREA -->
    <div class="flex-1 flex flex-col items-center justify-center px-6">

      <p class="text-white mb-6">Scan QR Code</p>

      <div class="relative w-72 h-72">

        <!-- frame -->
        <div class="absolute inset-0 border-2 border-white/30 rounded-xl"></div>

        <!-- corner -->
        <div class="absolute top-0 left-0 w-10 h-10 border-t-4 border-l-4 border-orange-500"></div>
        <div class="absolute top-0 right-0 w-10 h-10 border-t-4 border-r-4 border-orange-500"></div>
        <div class="absolute bottom-0 left-0 w-10 h-10 border-b-4 border-l-4 border-orange-500"></div>
        <div class="absolute bottom-0 right-0 w-10 h-10 border-b-4 border-r-4 border-orange-500"></div>

        <!-- scan line -->
        <div class="scan-line"></div>

      </div>

    </div>

    <!-- RESULT PANEL -->
    <div id="result-panel" class="hidden bg-white rounded-t-2xl p-6">

      <div class="flex flex-col items-center gap-3">

        <img id="avatar"
          class="w-20 h-20 rounded-full object-cover"
          src="https://via.placeholder.com/150"/>

        <p id="name" class="text-lg font-bold">-</p>

        <div class="flex gap-3 mt-4 w-full">
          <button onclick="restartScanner()"
            class="flex-1 bg-gray-200 py-3 rounded-xl">
            Scan Again
          </button>

          <button onclick="confirmCheckin()"
            class="flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold">
            Confirm
          </button>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- LIB -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ispbevvwwggbktfczmui.supabase.co",
  "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
);

let scanner;
let scannedEmploymentId = null;

/* ================= START CAMERA ================= */
async function startScanner() {
  scanner = new Html5Qrcode("reader");

  const devices = await Html5Qrcode.getCameras();

  const backCam = devices.find(d =>
    d.label.toLowerCase().includes("back")
  ) || devices[0];

  scanner.start(
    backCam.id,
    {
      fps: 10,
      qrbox: 250
    },
    onScanSuccess
  );
}
let scannedShiftId = null;

async function onScanSuccess(decodedText) {
  await scanner.stop();

  let shiftObj;
  try {
    shiftObj = JSON.parse(decodedText); // decode JSON
  } catch (e) {
    alert("Invalid QR format");
    startScanner();
    return;
  }

  scannedShiftId = shiftObj.shift_id; // <-- ใช้ global variable

  // โหลด shift
  const { data: shifts, error: shiftError } = await supabase
    .from("shifts")
    .select(`
      shift_id,
      employments!inner(
        job_application:job_application_id!inner(
          worker_id
        )
      )
    `)
    .eq("shift_id", scannedShiftId)
    .single();

  if (shiftError || !shifts) {
    alert("Invalid QR");
    console.error(shiftError);
    startScanner();
    return;
  }

  // STEP 2: โหลด job seeker info
  const workerId = shifts.employments.job_application.worker_id;
  const { data: workerData } = await supabase
    .from("job_seekers")
    .select("avatar_url, profiles:user_id(first_name,last_name)")
    .eq("job_seeker_id", workerId)
    .single();

  const profile = workerData.profiles;
  const fullName = [profile?.first_name, profile?.last_name].filter(Boolean).join(" ");
  document.getElementById("name").textContent = fullName;
  document.getElementById("avatar").src = workerData.avatar_url || "https://via.placeholder.com/150";

  document.getElementById("result-panel").classList.remove("hidden");
}

window.confirmCheckin = async function () {
  if (!scannedShiftId) return;

  const { data, error } = await supabase
    .from("shifts")
    .update({
      status: "login",
      checkin_time: new Date()
    })
    .eq("shift_id", scannedShiftId);

  if (error) {
    alert("Check-in failed");
    console.error(error);
  } else {
    alert("Check-in success");
  }

  restartScanner();
};

/* ================= RESTART ================= */
window.restartScanner = function () {
  document.getElementById("result-panel").classList.add("hidden");
  startScanner();
};

/* ================= START ================= */
startScanner();

</script>

</body>
</html>
