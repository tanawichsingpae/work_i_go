<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Employer - Manage Applicants</title>

<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8f9ff; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  /* กำหนดสี primary ให้ชัดเจน */
  :root {
    --primary: #345395;
    --success: #208672;
  }
  .bg-primary { background-color: var(--primary); }
  .bg-success { background-color: var(--success); }
</style>
</head>
<body class="min-h-screen">

<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md shadow-sm p-4 flex justify-between items-center">
  <button onclick="history.back()">
    <span class="material-symbols-outlined">arrow_back_ios_new</span>
  </button>
  <h2 id="job-title" class="font-bold text-lg">Manage</h2>
  <span class="material-symbols-outlined">more_horiz</span>
</header>

<main class="px-5 pt-4">

<!-- Filter Pills -->
<div id="filterPills" class="flex gap-2 mb-4 overflow-x-auto pb-2 no-scrollbar">
  <button onclick="showTab('Pending')" id="btnPending" class="px-6 py-2.5 rounded-full bg-primary text-white font-semibold text-sm shadow-lg">
    Pending <span id="pending-count" class="ml-1">0</span>
  </button>
  <button onclick="showTab('Approved')" id="btnApproved" class="px-6 py-2.5 rounded-full bg-gray-200 text-gray-700 font-medium text-sm hover:bg-gray-300">
    Accepted <span id="approved-count" class="ml-1">0</span>
  </button>
  <button onclick="showTab('Rejected')" id="btnRejected" class="px-6 py-2.5 rounded-full bg-gray-200 text-gray-700 font-medium text-sm hover:bg-gray-300">
    Declined <span id="rejected-count" class="ml-1">0</span>
  </button>
</div>

<!-- Applicants Containers -->
<div id="pending-container"></div>
<div id="approved-container" class="hidden"></div>
<div id="rejected-container" class="hidden"></div>

<!-- Empty State -->
<div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 px-10 text-center">
  <div class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center mb-6">
    <span class="material-symbols-outlined text-4xl text-gray-400">inbox</span>
  </div>
  <h3 class="font-bold text-gray-800 text-lg">No candidates yet</h3>
  <p class="text-gray-500 text-sm mt-2 leading-relaxed">This category is empty.</p>
</div>

</main>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://ispbevvwwggbktfczmui.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const jobpostId = new URLSearchParams(location.search).get("jobpost_id");

// render availability
function renderAvailability(avail = {}) {
  const days = ["mon","tue","wed","thu","fri","sat","sun"];
  const labels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const row = (label,key) => `<div class="grid grid-cols-8 gap-2 text-center items-center">
      <div class="text-left font-medium text-xs">${label}</div>
      ${days.map(d=>`<div class="h-3 rounded-full ${avail?.[d]?.includes(key)?"bg-success":"bg-gray-200"}"></div>`).join("")}
    </div>`;
  return `<div class="space-y-2 text-xs text-gray-500 bg-gray-50 p-3 rounded-xl">
    <div class="grid grid-cols-8 gap-2 text-center font-bold text-gray-400"><div></div>${labels.map(d=>`<div>${d}</div>`).join("")}</div>
    ${row("Morning","morning")}${row("Afternoon","afternoon")}${row("Evening","evening")}
  </div>`;
}

// Load job title
async function loadJobTitle() {
  const { data, error } = await sb.from("jobposts").select("job_title").eq("jobpost_id",jobpostId).single();
  if(!error && data) document.getElementById("job-title").innerText = "Manage: "+data.job_title;
}

// Load applicants
async function loadApplicants() {
  const { data, error } = await sb.from("job_applications")
    .select(`job_application_id,application_status,job_seekers(job_seeker_id,bio,gender,birth_date,availability,profiles(first_name,last_name,avatar_url))`)
    .eq("jobpost_id",jobpostId);
  if(error) return;
  
// โหลดข้อมูล

  

  const pendingContainer=document.getElementById("pending-container");
  const approvedContainer=document.getElementById("approved-container");
  const rejectedContainer=document.getElementById("rejected-container");
  pendingContainer.innerHTML=""; approvedContainer.innerHTML=""; rejectedContainer.innerHTML="";

  let pendingCount=0, approvedCount=0, rejectedCount=0;

  data.forEach(app=>{
    const s=app.job_seekers; const p=s?.profiles;
    if(!s||!p) return;
    const fullName=`${p.first_name??""} ${p.last_name??""}`.trim()||"Unknown";
    const avatar=p.avatar_url||"https://via.placeholder.com/150";
    const card = `
<div class="bg-white rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 p-6 space-y-4 border border-gray-100 mb-4">

  <!-- Header: Avatar + Name + Gender/Age -->
  <div class="flex items-center gap-4">
    <a href="ReviewProfilejobseeker.html?job_seeker_id=${s.job_seeker_id}" class="flex items-center gap-4 hover:no-underline">
      <img class="h-16 w-16 rounded-full object-cover ring-4 ring-primary/20" src="${avatar}" alt="Profile picture" />
      <div class="flex flex-col">
        <p class="text-primary text-lg font-bold">${fullName}</p>
        <p class="text-gray-500 text-sm">${s.gender ?? "-"} • ${getAge(s.birth_date)} ปี</p>
      </div>
    </a>
  </div>

  <!-- Bio -->
  <p class="text-gray-600 text-sm leading-relaxed line-clamp-3">${s.bio || "No bio provided"}</p>

  <!-- Availability -->
  <div>
    <p class="font-semibold mb-2 text-sm text-gray-700">Availability</p>
    ${renderAvailability(s.availability || {})}
  </div>

  <!-- Action Buttons -->
  ${app.application_status === "Pending" ? `
    <div class="grid grid-cols-2 gap-4 pt-2">
      <button 
          onclick="event.stopPropagation(); updateStatus('${app.job_application_id}','Rejected');"
          class="h-12 bg-red-500 hover:bg-red-600 text-white rounded-xl font-semibold transition-all duration-200">
        Decline
      </button>

      <button 
          onclick="event.stopPropagation(); updateStatus('${app.job_application_id}','Approved');"
          class="h-12 bg-success hover:opacity-90 text-white rounded-xl font-semibold transition-all duration-200">
        Accept
      </button>
    </div>
  ` : ""}

</div>
`;
    if(app.application_status==="Approved"){ approvedContainer.innerHTML+=card; approvedCount++; }
    else if(app.application_status==="Rejected"){ rejectedContainer.innerHTML+=card; rejectedCount++; }
    else { pendingContainer.innerHTML+=card; pendingCount++; }
  });

  document.getElementById("pending-count").innerText=pendingCount;
  document.getElementById("approved-count").innerText=approvedCount;
  document.getElementById("rejected-count").innerText=rejectedCount;

  showTab("Pending");
}

// Update status
// Update status + create employment if Approved
// Tab switch
window.showTab = function(status){
  const containers={
    "Pending":document.getElementById("pending-container"),
    "Approved":document.getElementById("approved-container"),
    "Rejected":document.getElementById("rejected-container")
  };
  Object.keys(containers).forEach(key=>containers[key].style.display="none");
  containers[status].style.display="block";

  ["Pending","Approved","Rejected"].forEach(s=>{
    const btn=document.getElementById("btn"+s);
    if(s===status){ 
      btn.classList.add("bg-primary","text-white","shadow-lg");
      btn.classList.remove("bg-gray-200","text-gray-700");
    } else { 
      btn.classList.remove("bg-primary","text-white","shadow-lg");
      btn.classList.add("bg-gray-200","text-gray-700");
    }
  });

  const emptyState=document.getElementById("emptyState");
  emptyState.classList.toggle("hidden",containers[status].children.length>0);
}

// Update status
window.updateStatus = async function(id, status) {
  console.log("🟢 Job Application ID:", id);
  console.log("🟢 Status to update:", status);

  try {
    const { error: updateError } = await sb
      .from("job_applications")
      .update({ application_status: status })
      .eq("job_application_id", id);

    if(updateError) return console.error("Error updating application:", updateError);

    if(status === "Approved"){
      const { error: empError, data: empData } = await sb
        .from("employments")
        .insert([{
          job_application_id: id,
          start_date: null,
          end_date: null,
          agreed_wage: null,
          employment_status: "Inactive"
        }]);

      if(empError) return console.error("Error creating employment:", empError);
      console.log("🟢 Inserted employment row:", empData);
    }

    loadApplicants();
  } catch(err){
    console.error(err);
  }
}
// คำนวณอายุ
function getAge(birthDateStr) {
  if(!birthDateStr) return "-";
  const today = new Date();
  const birthDate = new Date(birthDateStr);
  let age = today.getFullYear() - birthDate.getFullYear();
  const m = today.getMonth() - birthDate.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
    age--;
  }
  return age;
}
// Tab switch
function showTab(status){
  const containers={"Pending":document.getElementById("pending-container"),
                    "Approved":document.getElementById("approved-container"),
                    "Rejected":document.getElementById("rejected-container")};
  Object.keys(containers).forEach(key=>containers[key].style.display="none");
  containers[status].style.display="block";

  ["Pending","Approved","Rejected"].forEach(s=>{
    const btn=document.getElementById("btn"+s);
    if(s===status){ 
      btn.classList.add("bg-primary","text-white","shadow-lg");
      btn.classList.remove("bg-gray-200","text-gray-700");
    } else { 
      btn.classList.remove("bg-primary","text-white","shadow-lg");
      btn.classList.add("bg-gray-200","text-gray-700");
    }
  });

  const emptyState=document.getElementById("emptyState");
  emptyState.classList.toggle("hidden",containers[status].children.length>0);
}
window.showTab=showTab;

// Init
loadJobTitle();
loadApplicants();
</script>
</body>
</html>
